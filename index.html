<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ヒアリングツール | Mitta Lab.</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background-color: #faf8f5;
    color: #3d3833;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    line-height: 1.7;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #a89880;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .lead {
    font-size: 14px;
    color: #7a7268;
  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .tab-btn {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 10px 26px;
    border: 1px solid #d8cfc0;
    border-radius: 999px;
    background: #ffffff;
    color: #7a7268;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: #3d3833;
    border-color: #3d3833;
    color: #ffffff;
  }
  .chat-frame {
    background: #ffffff;
    border: 1px solid #e8e2d8;
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 4px 16px rgba(90, 80, 65, 0.06);
  }
  .chat-frame iframe {
    display: block;
    width: 100%;
    min-height: 700px;
    border: none;
    border-radius: 8px;
  }
  .hidden {
    display: none;
  }
  footer {
    text-align: center;
    margin-top: 24px;
    padding-bottom: 32px;
  }
  .memo {
    font-size: 11px;
    color: #b3aa9d;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="brand">Mitta Lab.</p>
    <h1>ヒアリングツール</h1>
    <p class="lead" id="lead-text">Webサイト制作のご希望を、チャットでおうかがいします。</p>
  </header>

  <div class="tabs">
    <button type="button" class="tab-btn active" id="btn-chatflow" onclick="showTab('chatflow')">チャットフロー</button>
    <button type="button" class="tab-btn" id="btn-voice" onclick="showTab('voice')">ボイスヒアリング</button>
  </div>

  <div class="chat-frame" id="frame-chatflow">
    <iframe src="https://udify.app/chatbot/Y59IUHzN9EbEmj76" style="width: 100%; height: 100%; min-height: 700px;" frameborder="0" allow="microphone"></iframe>
  </div>

  <div class="chat-frame hidden" id="frame-voice">
    <iframe src="https://udify.app/chatbot/9lPtPaspNlbn6BjJ" style="width: 100%; height: 100%; min-height: 700px;" frameborder="0" allow="microphone"></iframe>
  </div>

  <footer>
    <p class="memo">※自分用メモ:チャットフロー=お客様と画面共有して使う / ボイスヒアリング=手元で番号を手入力+内容を音声で吹き込む</p>
  </footer>
</div>

<script>
  function showTab(name) {
    var isVoice = (name === 'voice');
    document.getElementById('frame-chatflow').classList.toggle('hidden', isVoice);
    document.getElementById('frame-voice').classList.toggle('hidden', !isVoice);
    document.getElementById('btn-chatflow').classList.toggle('active', !isVoice);
    document.getElementById('btn-voice').classList.toggle('active', isVoice);
    document.getElementById('lead-text').textContent = isVoice
      ? '番号は手入力、内容は音声でおうかがいします。'
      : 'Webサイト制作のご希望を、チャットでおうかがいします。';
  }
</script>
</body>
</html>
