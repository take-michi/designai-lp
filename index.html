<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ヒアリングロボット | Mitta Lab.</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background-color: #faf8f5;
    color: #3d3833;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    line-height: 1.7;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #a89880;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .lead {
    font-size: 14px;
    color: #7a7268;
  }
  .chat-frame {
    background: #ffffff;
    border: 1px solid #e8e2d8;
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 4px 16px rgba(90, 80, 65, 0.06);
  }
  .chat-frame iframe {
    display: block;
    width: 100%;
    min-height: 700px;
    border: none;
    border-radius: 8px;
  }
  footer {
    text-align: center;
    margin-top: 24px;
    padding-bottom: 32px;
  }
  .memo {
    font-size: 11px;
    color: #b3aa9d;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="brand">Mitta Lab.</p>
    <h1>ヒアリングロボット</h1>
    <p class="lead">Webサイト制作のご希望を、チャットでおうかがいします。</p>
  </header>
  <div class="chat-frame">
    <iframe src="https://udify.app/chatbot/Y59IUHzN9EbEmj76" style="width: 100%; height: 100%; min-height: 700px;" frameborder="0" allow="microphone"></iframe>
  </div>
  <footer>
    <p class="memo">※自分用メモ：打ち合わせ中にお客様と画面共有して使う道具</p>
  </footer>
</div>
</body>
</html>
